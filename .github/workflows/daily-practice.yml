name: Daily Practice

on:
  schedule:
    # Runs once a day at 09:00 UTC. Change to suit your timezone.
    - cron: "0 9 * * *"
  workflow_dispatch: {}  # lets you trigger it manually too, for testing

permissions:
  contents: write

jobs:
  practice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Decide whether to run today
        id: gate
        run: |
          python3 - <<'EOF'
          import datetime, random, os

          today = datetime.date.today()
          is_weekend = today.weekday() >= 5  # 5=Sat, 6=Sun

          # On weekdays: run ~95% of the time.
          # On weekends: run only ~30% of the time (so weekends are mostly, not always, skipped).
          run_today = random.random() < (0.30 if is_weekend else 0.95)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"run={'true' if run_today else 'false'}\n")

          print(f"Weekend: {is_weekend}, running today: {run_today}")
          EOF

      - name: Generate today's practice snippet(s)
        if: steps.gate.outputs.run == 'true'
        run: python3 scripts/generate_practice.py

      - name: Commit and push
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add practice/
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Daily practice: $(date +'%Y-%m-%d')"
          git push